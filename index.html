<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baustellen-Mängel · Pin-Tool</title>
<style>
  :root{
    --rot:#e2001a; --rot-dark:#b80016;
    --offen:#e2001a; --bearb:#e8a400; --behoben:#1a9c4b;
    --bg:#f4f5f7; --card:#ffffff; --line:#e3e6ea; --text:#1d2125; --muted:#697077;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:15px;line-height:1.45}
  .wrap{max-width:1200px;margin:0 auto;padding:14px}
  header.bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .logo{font-weight:800;letter-spacing:.5px;margin-right:auto}
  .logo b{color:var(--rot)}
  .toolbar2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%;margin-bottom:12px}
  .toolbar2 .grp{display:flex;gap:6px;align-items:center;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:5px 8px}
  .toolbar2 label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  select.mini{border:none;background:transparent;font-size:14px;font-weight:600;font-family:inherit;color:var(--text);max-width:220px}
  .counts{display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:4px 11px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%}
  .layout{display:grid;grid-template-columns:1fr 360px;gap:14px}
  @media(max-width:860px){.layout{grid-template-columns:1fr}}
  .cardw{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .cardw .hd{padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;display:flex;align-items:center;gap:8px}
  .planpad{padding:10px}
  .planbox{position:relative;width:100%;background:#fafbfc;border-radius:10px;
    border:1px dashed var(--line);overflow:hidden;touch-action:manipulation}
  .planbox img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;min-height:280px;color:var(--muted);text-align:center;padding:24px}
  .pin{position:absolute;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;color:#fff;border-radius:50% 50% 50% 0;
    transform:translate(-50%,-100%) rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.35);border:2px solid #fff}
  .pin span{transform:rotate(45deg)}
  .pin.sel{outline:3px solid rgba(226,0,26,.35);z-index:5}
  .hint{font-size:12.5px;color:var(--muted);padding:4px 4px 8px}
  .btn{appearance:none;border:none;border-radius:9px;padding:8px 12px;font-size:13.5px;font-weight:700;cursor:pointer;
    font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:5px}
  .btn.primary{background:var(--rot);color:#fff}
  .btn.primary:hover{background:var(--rot-dark)}
  .btn.ghost{background:#eef0f3;color:var(--text)}
  .btn.ghost:hover{background:#e4e7eb}
  .btn.danger{background:#fff;color:var(--rot);border:1px solid var(--rot)}
  .btn.sm{padding:6px 10px;font-size:13px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .detail{padding:14px}
  .detail .none{color:var(--muted);text-align:center;padding:30px 10px}
  label.fld{display:block;font-size:12.5px;font-weight:700;color:var(--muted);
    margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}
  input[type=text],textarea,select.full{width:100%;border:1px solid var(--line);border-radius:9px;
    padding:9px 10px;font-size:14px;font-family:inherit;background:#fff;color:var(--text)}
  textarea{min-height:64px;resize:vertical}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;
    padding:8px 4px;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted)}
  .seg button.on[data-s=offen]{background:var(--offen);color:#fff;border-color:var(--offen)}
  .seg button.on[data-s=bearb]{background:var(--bearb);color:#fff;border-color:var(--bearb)}
  .seg button.on[data-s=behoben]{background:var(--behoben);color:#fff;border-color:var(--behoben)}
  .photo{margin-top:8px}
  .photo img{width:100%;border-radius:9px;border:1px solid var(--line)}
  .list{padding:8px;max-height:420px;overflow:auto}
  .item{display:flex;gap:10px;align-items:center;padding:9px;border-radius:10px;cursor:pointer}
  .item:hover{background:#f3f4f6}
  .item.sel{background:#fdeaec}
  .num{width:26px;height:26px;border-radius:50%;color:#fff;font-weight:800;font-size:12px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .item .t{flex:1;min-width:0}
  .item .t b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .t small{color:var(--muted)}
  .thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;border:1px solid var(--line)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .saved-note{font-size:12px;color:var(--muted);padding:6px 14px 12px}
  input[type=file]{display:none}
  .zoomctl{position:absolute;right:14px;bottom:14px;display:flex;gap:6px;z-index:6}
  .zoomctl button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15);line-height:1}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal .box{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:18px;box-shadow:0 12px 44px rgba(0,0,0,.3)}
  .modal .box .ti{font-weight:800;font-size:16px;margin-bottom:12px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="logo">HOFMANN<b>HAUS</b> · Baustellen-Mängel</div>
    <div class="counts" id="counts"></div>
  </header>

  <div class="toolbar2">
    <div class="grp"><label>Projekt</label>
      <select class="mini" id="projSel"></select>
      <button class="btn ghost sm" id="addProj">＋ Projekt</button>
    </div>
    <div class="grp"><label>Grundriss</label>
      <select class="mini" id="planSel"></select>
      <button class="btn ghost sm" id="addPlan">＋ Grundriss</button>
    </div>
    <button class="btn ghost sm" id="renamePlan" title="Grundriss umbenennen">✎</button>
    <button class="btn ghost sm" id="delPlan" title="Grundriss löschen">🗑</button>
    <div class="grp"><label>Haus</label><select class="mini" id="t_haus"></select></div>
    <div class="grp"><label>Raum</label><select class="mini" id="t_raum"></select></div>
    <div class="grp"><label>Wohnung</label><select class="mini" id="t_wohnung"></select></div>
    <button class="btn ghost sm" id="planRefresh" style="margin-left:auto" title="Pläne aus Notion neu laden">⟳ Pläne</button><button class="btn primary sm" id="refreshBtn">⟳ Mängel</button>
  </div>

  <div class="layout">
    <div class="cardw">
      <div class="hd">📍 <span id="planTitle">Grundriss</span></div>
      <div class="planpad">
        <div class="hint">Tippe auf den Plan, um an dieser Stelle einen Mangel zu setzen.</div>
        <div class="planbox" id="planbox">
          <div class="empty" id="empty">
            <div style="font-size:34px">🏗️</div>
            <div>Kein Grundriss. Lege oben einen an („＋ Grundriss").</div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="cardw" style="margin-bottom:14px">
        <div class="hd">📝 Mangel-Detail</div>
        <div class="detail" id="detail">
          <div class="none">Kein Mangel ausgewählt.<br>Tippe auf den Plan oder einen Eintrag.</div>
        </div>
      </div>
      <div class="cardw">
        <div class="hd" id="listhd" style="cursor:pointer">📋 Mängel dieses Grundrisses <span style="margin-left:auto;font-size:12px;color:var(--muted);font-weight:600">ein-/ausklappen</span></div>
        <div class="list" id="list"></div>
        <div class="saved-note" id="savednote"></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="planfile" accept="image/*,application/pdf">

<div class="modal" id="modal"><div class="box">
  <div class="ti" id="m_title"></div>
  <input type="text" id="m_input" placeholder="">
  <div class="row" style="justify-content:flex-end;margin-top:14px">
    <button class="btn ghost" id="m_cancel">Abbrechen</button>
    <button class="btn primary" id="m_ok">OK</button>
  </div>
</div></div>

const $ = s => document.querySelector(s);
const planbox = $("#planbox");
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
if(typeof pdfjsLib!=="undefined"){ pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; }

let db = load();
let sel = null;

/* ---------- Eigenes Eingabe-Fenster (prompt/confirm ersetzt, iframe-sicher) ---------- */
let _mRes=null, _mMode="text";
function askText(title, def){ return openModal("text", title, def||""); }
function askConfirm(title){ return openModal("confirm", title, ""); }
function openModal(mode, title, def){
  _mMode=mode; $("#m_title").textContent=title;
  const inp=$("#m_input"); inp.style.display = mode==="text" ? "block":"none"; inp.value=def;
  $("#modal").style.display="flex";
  if(mode==="text") setTimeout(()=>{ inp.focus(); inp.select(); },30);
  return new Promise(res=>{ _mRes=res; });
}
function closeModal(val){ $("#modal").style.display="none"; const r=_mRes; _mRes=null; if(r) r(val); }
$("#m_ok").onclick=()=>{ closeModal(_mMode==="text" ? ($("#m_input").value.trim()||null) : true); };
$("#m_cancel").onclick=()=>{ closeModal(_mMode==="text" ? null : false); };
$("#m_input").addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();$("#m_ok").click();} if(e.key==="Escape")$("#m_cancel").click(); });
$("#modal").addEventListener("click",e=>{ if(e.target.id==="modal") $("#m_cancel").click(); });

/* ---------- Persistenz ---------- */
function load(){
  try{ const d=JSON.parse(localStorage.getItem(STORE_KEY)); if(d && d.projects && d.projects.length) return d; }catch(e){}
  const planId=uid(), projId=uid();
  const d={ projects:[{id:projId, name:"Vista Stettenfels", plans:[{id:planId, name:"Penthouse B.08", img:DEFAULT_PLAN}]}], pins:{}, cProj:projId, cPlan:planId };
  d.pins[planId]=[]; return d;
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(db)); }
  catch(e){ note("⚠ Speicher voll — evtl. Grundrisse verkleinern/löschen."); }
  renderSaved();
}
function note(t){ const n=$("#savednote"); if(n) n.textContent=t; }

/* ---------- Zugriffshelfer ---------- */
function curProject(){ return db.projects.find(p=>p.id===db.cProj) || db.projects[0]; }
function curPlan(){ const p=curProject(); return (p.plans||[]).find(x=>x.id===db.cPlan) || (p.plans||[])[0]; }
function curPins(){ const pl=curPlan(); if(!pl) return []; if(!db.pins[pl.id]) db.pins[pl.id]=[]; return db.pins[pl.id]; }
function grundrissTag(){ const p=curProject(), pl=curPlan(); return pl ? (p.name+" · "+pl.name) : ""; }

/* ---------- Selektoren ---------- */
function renderSelectors(){
  $("#projSel").innerHTML = db.projects.map(p=>'<option value="'+p.id+'"'+(p.id===db.cProj?" selected":"")+'>'+esc(p.name)+'</option>').join("");
  const p=curProject();
  $("#planSel").innerHTML = (p.plans||[]).map(x=>'<option value="'+x.id+'"'+(x.id===db.cPlan?" selected":"")+'>'+esc(x.name)+'</option>').join("")
    || '<option value="">— kein Grundriss —</option>';
}

/* ---------- Grundriss anzeigen ---------- */
function loadPlan(){
  const pl=curPlan();
  $("#planTitle").textContent = pl ? (curProject().name+" · "+pl.name) : "Grundriss";
  if(!pl || !pl.img){
    planbox.innerHTML='<div class="empty"><div style="font-size:34px">🏗️</div><div>Kein Grundriss. „＋ Grundriss" oben.</div></div>';
    renderAll(); return;
  }
  const cross=/^https?:/i.test(pl.img)?' crossorigin="anonymous"':'';
  planbox.innerHTML='<div id="zoomwrap" style="position:relative;transform-origin:0 0;width:100%"><img id="planimg"'+cross+' src="'+pl.img+'" alt="Grundriss" style="display:block;width:100%"></div>'+
    '<div class="zoomctl"><button type="button" id="zin">+</button><button type="button" id="zout">\u2212</button><button type="button" id="zrst">\u27f2</button></div>';
  const im=$("#planimg");
  im.addEventListener("load", renderPins);
  setupZoom();
  renderAll();
}

/* ---------- Projekt / Grundriss verwalten ---------- */
$("#projSel").onchange=e=>{ db.cProj=e.target.value; const p=curProject(); db.cPlan=(p.plans[0]||{}).id||null; sel=null; save(); async function pdfDataUrlToPages(dataUrl){
  if(typeof pdfjsLib==="undefined") return [];
  const b64=dataUrl.split(",")[1]; const bin=atob(b64); const buf=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  const pdf=await pdfjsLib.getDocument({data:buf}).promise; const pages=[];
  for(let n=1;n<=pdf.numPages;n++){ const page=await pdf.getPage(n); const v0=page.getViewport({scale:1}); const scale=Math.min(2.5,1600/v0.width); const vp=page.getViewport({scale}); const c=document.createElement("canvas"); c.width=Math.round(vp.width); c.height=Math.round(vp.height); await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise; pages.push(c.toDataURL("image/jpeg",0.85)); }
  return pages;
}
async function loadPlansFromNotion(){
  if(!GRUNDRISS_READ_WEBHOOK) return;
  try{
    const r=await fetch(GRUNDRISS_READ_WEBHOOK,{method:"POST",body:new URLSearchParams({})});
    if(!r.ok) return;
    const rows=await r.json(); const arr=Array.isArray(rows)?rows:(rows.results||[]);
    let added=0;
    for(const o of arr){
      if(!o.bild) continue;
      const projName=o.projekt||"Ohne Projekt";
      let proj=db.projects.find(p=>p.name===projName);
      if(!proj){ proj={id:uid(),name:projName,plans:[]}; db.projects.push(proj); }
      if(o.bild.indexOf("data:application/pdf")===0){
        const pages=await pdfDataUrlToPages(o.bild);
        pages.forEach((img,i)=>{ const nm=pages.length>1?(o.grundriss+" · Seite "+(i+1)):o.grundriss; if(!proj.plans.find(x=>x.name===nm)){ const id=uid(); proj.plans.push({id,name:nm,img,fromNotion:true}); if(!db.pins[id])db.pins[id]=[]; added++; } });
      } else {
        if(!proj.plans.find(x=>x.name===o.grundriss)){ const id=uid(); proj.plans.push({id,name:o.grundriss,img:o.bild,fromNotion:true}); if(!db.pins[id])db.pins[id]=[]; added++; }
      }
    }
    if(added>0){ if(!curPlan() && db.projects[0] && db.projects[0].plans[0]){ db.cProj=db.projects[0].id; db.cPlan=db.projects[0].plans[0].id; } save(); let ctx={haus:"",raum:"Sonstiges",wohnung:""};
function fillTopSelects(){
  if(!$("#t_haus"))return;
  $("#t_haus").innerHTML=HAEUSER.map(h=>'<option value="'+h+'">'+(h?h:"Haus –")+'</option>').join("");
  $("#t_raum").innerHTML=RAEUME.map(r=>'<option value="'+r+'">'+r+'</option>').join("");
  $("#t_wohnung").innerHTML=WOHNUNGEN.map(w=>'<option value="'+w+'">'+(w?("Whg "+w):"Whg –")+'</option>').join("");
  $("#t_haus").onchange=e=>topChange("haus",e.target.value);
  $("#t_raum").onchange=e=>topChange("raum",e.target.value);
  $("#t_wohnung").onchange=e=>topChange("wohnung",e.target.value);
  syncTop();
}
function topChange(k,v){ ctx[k]=v; const m=curPins().find(x=>x.id===sel); if(m){ m[k]=v; save(); renderList(); } }
function syncTop(){ const m=curPins().find(x=>x.id===sel); const src=m||ctx; if($("#t_haus"))$("#t_haus").value=src.haus||""; if($("#t_raum"))$("#t_raum").value=src.raum||"Sonstiges"; if($("#t_wohnung"))$("#t_wohnung").value=src.wohnung||""; }
fillTopSelects();
renderSelectors(); loadPlan();
if($("#planRefresh"))$("#planRefresh").onclick=()=>loadPlansFromNotion();
if($("#listhd"))$("#listhd").onclick=()=>{ const l=$("#list"),n=$("#savednote"); const hide=l.style.display!=="none"; l.style.display=hide?"none":""; if(n)n.style.display=hide?"none":""; }; note("Pläne aus Notion geladen ("+added+")."); }
  }catch(e){}
}
renderSelectors(); loadPlan();
loadPlansFromNotion(); };
$("#planSel").onchange=e=>{ db.cPlan=e.target.value; sel=null; save(); loadPlan(); };

$("#addProj").onclick=async ()=>{
  const name=await askText("Name des neuen Projekts:","");
  if(!name) return;
  const id=uid();
  db.projects.push({id, name, plans:[]});
  db.cProj=id; db.cPlan=null; sel=null; save(); renderSelectors(); loadPlan();
  note('Projekt „'+name+'" angelegt. Jetzt „＋ Grundriss" tippen, um einen Plan zu laden.');
};

// Grundriss: erst Datei wählen (im Klick-Kontext!), dann Namen abfragen
$("#addPlan").onclick=()=>{ $("#planfile").click(); };
$("#planfile").addEventListener("change", e=>{
  const f=e.target.files[0]; e.target.value=""; if(!f) return;
  if(f.type==="application/pdf" || /\.pdf$/i.test(f.name)){ handlePdf(f); return; }
  resizeImg(f,1400,0.82, async dataUrl=>{
    let nm=await askText("Bezeichnung des Grundrisses (z. B. EG, 1. OG, Wohnung 7):", f.name.replace(/\.[^.]+$/,""));
    if(!nm) nm=f.name.replace(/\.[^.]+$/,"")||"Grundriss";
    const p=curProject(); const id=uid();
    p.plans.push({id, name:nm, img:dataUrl});
    db.pins[id]=[]; db.cPlan=id; sel=null; save(); renderSelectors(); loadPlan();
  });
});
$("#renamePlan").onclick=async ()=>{
  const pl=curPlan(); if(!pl) return;
  const nm=await askText("Grundriss umbenennen:", pl.name); if(!nm) return;
  pl.name=nm; save(); renderSelectors(); $("#planTitle").textContent=curProject().name+" · "+pl.name;
};
$("#delPlan").onclick=async ()=>{
  const p=curProject(), pl=curPlan(); if(!pl) return;
  if(!(await askConfirm('Grundriss „'+pl.name+'" mit allen Pins löschen?'))) return;
  delete db.pins[pl.id]; p.plans=p.plans.filter(x=>x.id!==pl.id);
  db.cPlan=(p.plans[0]||{}).id||null; sel=null; save(); renderSelectors(); loadPlan();
};

/* ---------- Aktualisieren (aus Notion lesen) ---------- */
$("#refreshBtn").onclick=async ()=>{
  if(!N8N_READ_WEBHOOK){ note("Kein Lese-Webhook hinterlegt (N8N_READ_WEBHOOK). Zeigt lokalen Stand."); renderAll(); return; }
  const pl=curPlan(); if(!pl) return;
  note("Lade aktuellen Stand aus Notion…");
  try{
    const r=await fetch(N8N_READ_WEBHOOK,{method:"POST",body:new URLSearchParams({grundriss:grundrissTag()})});
    if(!r.ok){ note("Fehler "+r.status+" beim Lesen."); return; }
    const rows=await r.json(); const arr=Array.isArray(rows)?rows:(rows.results||[]);
    const mapped=arr.filter(o=>!o.grundriss||o.grundriss===grundrissTag()).map(o=>({
      id:uid(), x:+o.posX||+o.x||0, y:+o.posY||+o.y||0, mangel:o.mangel||o.titel||"", text:o.beschreibung||o.text||"",
      raum:o.raum||"Sonstiges", status:(o.status==="in Bearbeitung"?"bearb":(o.status==="behoben"?"behoben":"offen")),
      photo:o.foto||"", crop:o.planausschnitt||"", datum:o.datum||"", notion:true
    }));
    db.pins[pl.id]=mapped; sel=null; save(); renderAll(); note("✓ Aktualisiert: "+mapped.length+" Mängel aus Notion.");
  }catch(e){ note("Netzwerkfehler beim Lesen — Webhook/CORS prüfen."); }
};

/* ---------- Pin setzen ---------- */
function onPlanClick(e){
  const img=$("#planimg"); if(!img) return; const r=img.getBoundingClientRect();
  const x=+(((e.clientX-r.left)/r.width)*100).toFixed(2);
  const y=+(((e.clientY-r.top)/r.height)*100).toFixed(2);
  const m={id:uid(), x, y, mangel:"", text:"", raum:ctx.raum, gewerk:"", haus:ctx.haus, wohnung:ctx.wohnung, status:"offen", photo:"", crop:"", cropError:false, datum:new Date().toISOString().slice(0,10), notion:false};
  makeCrop(m); curPins().push(m); sel=m.id; save(); renderAll();
}

/* ---------- Planausschnitt mit Pin ---------- */
function makeCrop(m){
  const img=$("#planimg"); if(!img || !img.naturalWidth) return;
  const NW=img.naturalWidth, NH=img.naturalHeight;
  const cx=NW*m.x/100, cy=NH*m.y/100;
  let cw=NW*0.42, ch=cw*0.72; if(ch>NH){ch=NH;cw=ch/0.72;} if(cw>NW){cw=NW;ch=cw*0.72;}
  let sx=cx-cw/2, sy=cy-ch/2; sx=Math.max(0,Math.min(sx,NW-cw)); sy=Math.max(0,Math.min(sy,NH-ch));
  const scale=Math.min(1,900/cw);
  const c=document.createElement("canvas"); c.width=Math.round(cw*scale); c.height=Math.round(ch*scale);
  const ctx=c.getContext("2d");
  try{
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img,sx,sy,cw,ch,0,0,c.width,c.height);
    drawPin(ctx,(cx-sx)*scale,(cy-sy)*scale,STAT[m.status].h);
    m.crop=c.toDataURL("image/png"); m.cropError=false;
  }catch(err){ m.crop=""; m.cropError=true; }
}
function drawPin(ctx,px,py,color){
  const r=13; ctx.save();
  ctx.beginPath(); ctx.moveTo(px-7,py+r-2); ctx.lineTo(px+7,py+r-2); ctx.lineTo(px,py+r+11); ctx.closePath(); ctx.fillStyle=color; ctx.fill();
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle="#fff"; ctx.stroke(); ctx.restore();
}

/* ---------- Render ---------- */
function setupZoom(){
  const box=planbox; const wrap=document.getElementById("zoomwrap"); if(!wrap) return;
  let zoom=1,px=0,py=0,down=false,sx=0,sy=0,ox=0,oy=0,moved=false;
  function clamp(){ const w=box.clientWidth,hb=box.clientHeight,h=wrap.offsetHeight; if(zoom<=1){px=0;py=0;return;} if(px>0)px=0; if(py>0)py=0; const minX=w-w*zoom; if(px<minX)px=minX; const minY=hb-h*zoom; if(minY<0){ if(py<minY)py=minY; } else { py=0; } }
  function apply(){ wrap.style.transform="translate("+px+"px,"+py+"px) scale("+zoom+")"; }
  function setZ(z,cx,cy){ const nz=Math.max(1,Math.min(6,z)); if(cx!=null){ px=cx-(cx-px)*(nz/zoom); py=cy-(cy-py)*(nz/zoom); } zoom=nz; clamp(); apply(); }
  document.getElementById("zin").onclick=()=>setZ(zoom*1.3, box.clientWidth/2, box.clientHeight/2);
  document.getElementById("zout").onclick=()=>setZ(zoom/1.3, box.clientWidth/2, box.clientHeight/2);
  document.getElementById("zrst").onclick=()=>setZ(1);
  box.addEventListener("wheel",e=>{ e.preventDefault(); const r=box.getBoundingClientRect(); setZ(zoom*(e.deltaY<0?1.15:1/1.15), e.clientX-r.left, e.clientY-r.top); },{passive:false});
  box.addEventListener("pointerdown",e=>{ if(e.target.closest(".pin")||e.target.closest(".zoomctl")) return; down=true;moved=false;sx=e.clientX;sy=e.clientY;ox=px;oy=py; try{box.setPointerCapture(e.pointerId);}catch(_){} });
  box.addEventListener("pointermove",e=>{ if(!down)return; const dx=e.clientX-sx,dy=e.clientY-sy; if(Math.abs(dx)+Math.abs(dy)>6)moved=true; if(zoom>1){px=ox+dx;py=oy+dy;clamp();apply();} });
  box.addEventListener("pointerup",e=>{ if(!down)return; down=false; if(!moved && !e.target.closest(".pin") && !e.target.closest(".zoomctl")) onPlanClick(e); });
}
function renderPins(){
  const im=$("#planimg"); if(!im) return;
  const _zw=document.getElementById("zoomwrap")||planbox; [..._zw.querySelectorAll(".pin")].forEach(p=>p.remove());
  curPins().forEach((m,i)=>{
    const p=document.createElement("div");
    p.className="pin"+(m.id===sel?" sel":"");
    p.style.left=m.x+"%"; p.style.top=m.y+"%"; p.style.background=STAT[m.status].c;
    p.innerHTML="<span>"+(i+1)+"</span>";
    p.onclick=ev=>{ ev.stopPropagation(); sel=m.id; renderAll(); };
    (document.getElementById("zoomwrap")||planbox).appendChild(p);
  });
}
function renderCounts(){
  const c={offen:0,bearb:0,behoben:0}; curPins().forEach(m=>c[m.status]++);
  $("#counts").innerHTML=Object.keys(STAT).map(k=>'<span class="chip"><span class="dot" style="background:'+STAT[k].c+'"></span>'+STAT[k].l+': '+c[k]+'</span>').join("")+'<span class="chip">Σ '+curPins().length+'</span>';
}
function renderList(){
  const el=$("#list"); const pins=curPins();
  if(!pins.length){ el.innerHTML='<div class="none" style="color:var(--muted);text-align:center;padding:20px">Noch keine Mängel auf diesem Grundriss.</div>'; return; }
  el.innerHTML=pins.map((m,i)=>'<div class="item '+(m.id===sel?"sel":"")+'" data-id="'+m.id+'">'+
    '<div class="num" style="background:'+STAT[m.status].c+'">'+(i+1)+'</div>'+
    (m.photo?'<img class="thumb" src="'+m.photo+'">':(m.crop?'<img class="thumb" src="'+m.crop+'">':''))+
    '<div class="t"><b>'+(esc(m.mangel)||esc(m.text)||"(ohne Titel)")+'</b><small>'+esc(m.raum)+' · '+STAT[m.status].l+'</small></div></div>').join("");
  [...el.querySelectorAll(".item")].forEach(it=> it.onclick=()=>{ sel=it.dataset.id; renderAll(); });
}
function renderDetail(){
  const el=$("#detail"); const m=curPins().find(x=>x.id===sel);
  if(!m){ el.innerHTML='<div class="none">Kein Mangel ausgewählt.<br>Tippe auf den Plan oder einen Eintrag.</div>'; return; }
  const idx=curPins().indexOf(m)+1;
  el.innerHTML=
    '<div class="row" style="align-items:center"><div class="num" style="background:'+STAT[m.status].c+'">'+idx+'</div><strong>Mangel #'+idx+'</strong></div>'+
    '<label class="fld">Titel</label><input type="text" id="f_mangel" value="'+esc(m.mangel)+'" placeholder="z.B. Riss in der Fuge">'+
    '<label class="fld">Beschreibung</label><textarea id="f_text" placeholder="Details…">'+esc(m.text)+'</textarea>'+
    '<label class="fld">Gewerk</label><select class="full" id="f_gewerk">'+GEWERKE.map(g=>'<option '+(g===m.gewerk?"selected":"")+'>'+g+'</option>').join("")+'</select>'+
    '<label class="fld">Status</label><div class="seg" id="f_status">'+Object.keys(STAT).map(k=>'<button data-s="'+k+'" class="'+(m.status===k?"on":"")+'">'+STAT[k].l+'</button>').join("")+'</div>'+
    '<label class="fld">Foto</label><button class="btn ghost sm" id="f_photobtn">'+(m.photo?"Foto ersetzen":"📷 Foto aufnehmen / wählen")+'</button>'+
      (m.photo?'<div class="photo"><img src="'+m.photo+'"></div>':'')+'<input type="file" id="f_photo" accept="image/*" capture="environment">'+
    '<label class="fld">Planausschnitt mit Pin (automatisch)</label>'+
      (m.crop?'<div class="photo"><img src="'+m.crop+'"></div>':'<div class="hint" style="padding:0 0 4px">'+(m.cropError?"Ausschnitt nicht möglich (CORS).":"Noch kein Ausschnitt.")+'</div>')+
      '<div class="row" style="margin-top:6px"><button class="btn ghost sm" id="f_recrop">Ausschnitt neu</button>'+(m.crop?'<a class="btn ghost sm" download="planausschnitt_'+idx+'.png" href="'+m.crop+'">⬇</a>':'')+'</div>'+
    '<div class="toolbar"><button class="btn primary sm" id="f_notion">✓ In Notion speichern</button><button class="btn danger sm" id="f_del">Löschen</button></div>'+
    '<div class="hint" id="f_notionmsg" style="padding:6px 0 0">'+(m.notion?"✓ aus/in Notion":"")+'</div>';

  $("#f_mangel").oninput=e=>{ m.mangel=e.target.value; save(); renderList(); };
  $("#f_text").oninput=e=>{ m.text=e.target.value; save(); };
  $("#f_gewerk").onchange=e=>{ m.gewerk=e.target.value; save(); };
  [...$("#f_status").children].forEach(b=> b.onclick=()=>{ m.status=b.dataset.s; makeCrop(m); save(); renderAll(); });
  $("#f_photobtn").onclick=()=>$("#f_photo").click();
  $("#f_photo").onchange=e=>{ const f=e.target.files[0]; if(f) resizeImg(f,1000,0.7,d=>{ m.photo=d; save(); renderAll(); }); };
  $("#f_recrop").onclick=()=>{ makeCrop(m); save(); renderAll(); };
  $("#f_notion").onclick=()=>pushToNotion(m);
  $("#f_del").onclick=async ()=>{ if(await askConfirm("Diesen Mangel löschen?")){ const a=curPins(); const i=a.indexOf(m); if(i>=0)a.splice(i,1); sel=null; save(); renderAll(); } };
}
function renderAll(){ renderPins(); renderCounts(); renderList(); renderDetail(); syncTop(); }
function renderSaved(){ note(curPins().length+" Mängel · "+grundrissTag()+" · lokal gespeichert"); }

/* ---------- Mangel -> Notion (schreiben) ---------- */
async function pushToNotion(m){
  const msg=$("#f_notionmsg");
  if(!N8N_WEBHOOK){ if(msg) msg.textContent="Kein n8n-Webhook hinterlegt (N8N_WEBHOOK)."; return; }
  if(msg) msg.textContent="Sende nach Notion…";
  try{
    const r=await fetch(N8N_WEBHOOK,{method:"POST",body:new URLSearchParams({
      mangel:m.mangel||"Neuer Mangel", beschreibung:m.text||"", raum:m.raum, status:STAT[m.status].n,
      posX:m.x, posY:m.y, grundriss:grundrissTag(), projekt:curProject().name, datum:m.datum,
      foto:m.photo||"", planausschnitt:m.crop||"", gewerk:m.gewerk||"", haus:m.haus||"", wohnung:m.wohnung||"", secret:SECRET
    })});
    if(r.ok){ m.notion=true; save(); if(msg) msg.textContent="✓ In Notion gespeichert."; }
    else if(msg) msg.textContent="Fehler "+r.status+" — Webhook prüfen.";
  }catch(e){ if(msg) msg.textContent="Netzwerkfehler — Webhook/CORS prüfen."; }
}

/* ---------- Bild verkleinern ---------- */
async function handlePdf(f){
  if(typeof pdfjsLib==="undefined"){ note("PDF-Bibliothek nicht geladen (Internet nötig)."); return; }
  note("PDF wird gelesen…");
  try{
    const buf=await f.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const pages=[];
    for(let n=1;n<=pdf.numPages;n++){
      const page=await pdf.getPage(n);
      const v0=page.getViewport({scale:1});
      const scale=Math.min(2.5, 1600/v0.width);
      const vp=page.getViewport({scale});
      const c=document.createElement("canvas"); c.width=Math.round(vp.width); c.height=Math.round(vp.height);
      await page.render({canvasContext:c.getContext("2d"), viewport:vp}).promise;
      pages.push(c.toDataURL("image/jpeg",0.85));
    }
    let base=await askText("Bezeichnung (mehrere Seiten werden als Grundrisse angehängt):", f.name.replace(/\.pdf$/i,""));
    if(!base) base=f.name.replace(/\.pdf$/i,"")||"Plan";
    const p=curProject();
    pages.forEach((img,i)=>{ const id=uid(); const nm=pages.length>1?base+" · Seite "+(i+1):base; p.plans.push({id,name:nm,img}); db.pins[id]=[]; if(i===0) db.cPlan=id; });
    sel=null; save(); renderSelectors(); loadPlan();
    note("PDF geladen: "+pages.length+" Seite(n).");
  }catch(err){ note("PDF konnte nicht gelesen werden."); }
}
function resizeImg(file, max, q, cb){
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>h && w>max){h=h*max/w;w=max;} else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",q));
  }; img.src=r.result; };
  r.readAsDataURL(file);
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

/* ---------- Start ---------- */
renderSelectors(); loadPlan();
