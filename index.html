<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baustellen-Mängel · Pin-Tool</title>
<style>
  :root{ --rot:#c0182c; --dunkel:#1a1a1a; --grau:#6b7280; --hell:#f4f4f5; --linie:#e4e4e7; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:var(--dunkel); background:#fff; }
  .wrap{ max-width:820px; margin:0 auto; padding:14px; }
  .kopf{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .kopf b{ font-size:18px; letter-spacing:.3px; }
  .kopf b span{ color:var(--rot); }
  .zaehler{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .chip{ font-size:12px; padding:4px 10px; border-radius:999px; background:var(--hell); border:1px solid var(--linie); }
  .chip .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .toolbar{ display:flex; gap:6px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px; }
  .toolbar label{ font-size:11px; color:var(--grau); display:flex; flex-direction:column; gap:2px; }
  select,input,textarea{ font-family:inherit; font-size:14px; padding:7px 9px; border:1px solid var(--linie); border-radius:8px; background:#fff; }
  select{ min-width:120px; }
  .btn{ font-size:13px; padding:8px 12px; border-radius:8px; border:1px solid var(--linie); background:#fff; cursor:pointer; }
  .btn:active{ transform:scale(.97); }
  .btn.rot{ background:var(--rot); color:#fff; border-color:var(--rot); }
  .btn.klein{ padding:6px 9px; font-size:12px; }
  .karte{ border:1px solid var(--linie); border-radius:12px; overflow:hidden; margin-bottom:14px; }
  .karte-kopf{ padding:10px 12px; font-weight:600; font-size:14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--linie); }
  .planbox{ position:relative; background:var(--hell); overflow:hidden; touch-action:none; cursor:crosshair; }
  .planinner{ position:relative; transform-origin:0 0; }
  .planinner img{ display:block; width:100%; height:auto; user-select:none; -webkit-user-drag:none; }
  .hinweis{ padding:10px 12px; font-size:13px; color:var(--grau); }
  .leer{ padding:40px 16px; text-align:center; color:var(--grau); }
  .leer .em{ font-size:34px; display:block; margin-bottom:8px; }
  .pin{ position:absolute; width:0; height:0; }
  .pin .scaler{ position:absolute; left:0; top:0; transform-origin:0 0; }
  .pin .marker{ position:absolute; left:-12px; top:-29px; width:24px; height:24px;
        border-radius:50% 50% 50% 0; transform:rotate(45deg); background:var(--rot);
        display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.4); cursor:pointer; }
  .pin .marker span{ transform:rotate(-45deg); color:#fff; font-weight:700; font-size:12px; }
  .pin.offen .marker{ background:#c0182c; } .pin.bearb .marker{ background:#d97706; } .pin.behoben .marker{ background:#16a34a; }
  .pin.aktiv .marker{ outline:3px solid #000; outline-offset:1px; }
  .zoombar{ position:absolute; right:8px; bottom:8px; display:flex; gap:4px; }
  .zoombar .btn{ width:36px; height:36px; padding:0; font-size:19px; display:flex; align-items:center; justify-content:center; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .detail{ padding:12px; display:grid; gap:8px; }
  .detail .reihe{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .detail label{ font-size:11px; color:var(--grau); display:flex; flex-direction:column; gap:3px; }
  .detail input,.detail textarea,.detail select{ width:100%; }
  .detail textarea{ resize:vertical; min-height:52px; }
  .detail .aktionen{ display:flex; gap:8px; margin-top:4px; }
  .miniplan{ margin-top:4px; }
  .miniplan img{ max-width:100%; border:1px solid var(--linie); border-radius:8px; }
  .liste-kopf{ cursor:pointer; user-select:none; }
  .liste-kopf .pfeil{ transition:transform .15s; display:inline-block; }
  .liste-kopf.zu .pfeil{ transform:rotate(-90deg); }
  .eintrag{ padding:9px 12px; border-bottom:1px solid var(--linie); display:flex; align-items:center; gap:10px; cursor:pointer; font-size:13px; }
  .eintrag:last-child{ border-bottom:none; }
  .eintrag .nr{ width:22px; height:22px; border-radius:50%; background:var(--rot); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .eintrag .txt{ flex:1; min-width:0; }
  .eintrag .txt small{ color:var(--grau); }
  .eintrag.aktiv{ background:var(--hell); }
  .st{ font-size:11px; padding:2px 7px; border-radius:999px; white-space:nowrap; }
  .st.offen{ background:#fde8ea; color:#c0182c; } .st.bearb{ background:#fef3c7; color:#b45309; } .st.behoben{ background:#dcfce7; color:#15803d; }
  .lade{ padding:10px 12px; font-size:12px; color:var(--grau); }
  .fehler{ padding:10px 12px; font-size:12px; color:var(--rot); }
  .filebtn{ display:inline-block; padding:7px 10px; border:1px dashed var(--linie); border-radius:8px; font-size:12px; cursor:pointer; color:var(--grau); }
  input[type=file]{ display:none; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<div class="wrap">

  <div class="kopf">
    <b>HOFMANN<span>HAUS</span> · Baustellen-Mängel</b>
  </div>

  <div class="zaehler" id="zaehler"></div>

  <div class="toolbar">
    <label>Projekt<select id="selProjekt"></select></label>
    <label>Grundriss<select id="selPlan"></select></label>
    <label>Haus<select id="selHaus"></select></label>
    <label>Raum<select id="selRaum"></select></label>
    <label>Wohnung<select id="selWohnung"></select></label>
    <button class="btn klein" id="btnPlaene">⟳ Pläne</button>
    <button class="btn klein" id="btnMangel">⟳ Mängel</button>
  </div>

  <div class="karte">
    <div class="karte-kopf">📍 <span id="planTitel">Grundriss</span></div>
    <div class="hinweis" id="planHinweis">Tippe auf den Plan, um an dieser Stelle einen Mangel zu setzen. Mausrad / zwei Finger = Zoom.</div>
    <div class="planbox" id="planbox">
      <div class="planinner" id="planinner"></div>
      <div class="zoombar">
        <button class="btn" id="zPlus">+</button>
        <button class="btn" id="zMinus">−</button>
        <button class="btn" id="zReset">⟲</button>
      </div>
    </div>
    <div class="lade" id="planStatus"></div>
  </div>

  <div class="karte" id="detailKarte" style="display:none">
    <div class="karte-kopf">📝 Mangel-Detail</div>
    <div class="detail" id="detail"></div>
  </div>

  <div class="karte">
    <div class="karte-kopf liste-kopf" id="listeKopf">
      <span class="pfeil">▾</span> Mängel dieses Grundrisses <small id="listeAnzahl" style="color:var(--grau);font-weight:400"></small>
    </div>
    <div id="liste"></div>
  </div>

</div>

<script>
/* ============ KONFIGURATION ============ */
const N8N_WRITE       = "https://hofmann-haus.app.n8n.cloud/webhook/baustellen-mangel";
const N8N_READ_MANGEL = "https://hofmann-haus.app.n8n.cloud/webhook/baustellen-mangel-read";
const N8N_READ_PLAN   = "https://hofmann-haus.app.n8n.cloud/webhook/grundrisse-read";
const SECRET          = "hofmann-mangel-8Wc3Kp9Z";
const VERSION         = "NEUBAU v5";
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const GEWERKE = ["","Rohbau","Estrich","Trockenbau","Fliesen","Maler","Elektro","Sanitär","Heizung","Fenster","Türen","Bodenbelag","Dach","Fassade","Aufzug","Außenanlage","Sonstiges"];
const RAEUME  = ["Sonstiges","Wohnen/Essen/Kochen","Schlafen","Kind","Bad","Gäste-WC","Diele","Flur","Abstell","Technik","Balkon/Terrasse","Keller","Treppenhaus","Aufzug","Außen"];
const HAEUSER = ["","A","B","C","D","E"];

/* ============ ZUSTAND ============ */
let PLANS = [];
let MANGEL = [];
let curProjekt = "";
let curPlanName = "";
let selId = null;
let scale = 1, tx = 0, ty = 0;
let ctx = { haus:"", raum:"Sonstiges", wohnung:"" };

const $ = id => document.getElementById(id);

/* ============ START ============ */
window.addEventListener("DOMContentLoaded", async () => {
  console.log("WIDGET " + VERSION + " geladen");
  try{ if(navigator.storage && navigator.storage.persist) navigator.storage.persist(); }catch(e){}
  fuelleStatischeSelects();
  bindeEvents();
  initInteraktion();
  const cp = await cacheLadePlans();
  const cm = await cacheLadeMangel();
  if(cp && Array.isArray(cp) && cp.length){
    PLANS = cp;
    if(cm && Array.isArray(cm)) MANGEL = cm;
    if(!PLANS.some(p => (p.projekt||"")===curProjekt)) curProjekt = PLANS[0].projekt||"";
    renderProjektSelect(); waehleErstenPlan(); renderPlanSelect(); renderPlan(); renderZaehler();
    $("planStatus").innerHTML = "Aus Cache · "+PLANS.length+" Pläne, "+MANGEL.length+" Mängel. <b>⟳</b> zum Aktualisieren.";
  } else {
    await ladePlaene();
    await ladeMangel();
  }
});

function fuelleStatischeSelects(){
  $("selRaum").innerHTML   = RAEUME.map(r => `<option>${r}</option>`).join("");
  $("selHaus").innerHTML   = HAEUSER.map(h => `<option value="${h}">${h||"–"}</option>`).join("");
  const wohnOpts = ['<option value="">–</option>'];
  for(let i=1;i<=20;i++){ const v=String(i).padStart(2,"0"); wohnOpts.push(`<option value="${v}">${v}</option>`); }
  $("selWohnung").innerHTML = wohnOpts.join("");
}

function bindeEvents(){
  $("btnPlaene").onclick  = () => ladePlaene().then(ladeMangel);
  $("btnMangel").onclick  = ladeMangel;
  $("selProjekt").onchange = e => { curProjekt = e.target.value; waehleErstenPlan(); renderPlanSelect(); resetZoom(); renderPlan(); };
  $("selPlan").onchange    = e => { curPlanName = e.target.value; selId=null; resetZoom(); renderPlan(); };
  $("selHaus").onchange    = e => ctx.haus = e.target.value;
  $("selRaum").onchange    = e => ctx.raum = e.target.value;
  $("selWohnung").onchange = e => ctx.wohnung = e.target.value;
  $("zPlus").onclick  = () => { const b=$("planbox"); zoomBy(b.clientWidth/2, b.clientHeight/2, 1.35); };
  $("zMinus").onclick = () => { const b=$("planbox"); zoomBy(b.clientWidth/2, b.clientHeight/2, 1/1.35); };
  $("zReset").onclick = () => resetZoom(true);
  $("listeKopf").onclick = () => { $("listeKopf").classList.toggle("zu"); $("liste").style.display = $("listeKopf").classList.contains("zu")?"none":"block"; };
}

/* ============ NETZWERK (form-encoded => kein CORS-Preflight) ============ */
function post(url, obj){
  const body = new URLSearchParams();
  Object.keys(obj).forEach(k => body.append(k, obj[k]==null?"":obj[k]));
  return fetch(url, { method:"POST", body });
}

/* ---- Pläne aus Notion ---- */
async function ladePlaene(){
  $("planStatus").textContent = "Lade Grundrisse aus Notion …";
  try{
    const r = await post(N8N_READ_PLAN, { secret:SECRET });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const rows = await r.json();
    const arr = Array.isArray(rows) ? rows : [];
    PLANS = arr
      .filter(x => x && (x.bild || x.grundriss))
      .map(x => ({ projekt:(x.projekt||"").trim(), name:(x.grundriss||"Grundriss").trim(), img:x.bild||"" }));
    if(!PLANS.length){ $("planStatus").textContent = "Keine Grundrisse in Notion gefunden."; renderProjektSelect(); renderPlan(); return; }
    const pdfAnzahl = PLANS.filter(p => istPdf(p.img)).length;
    if(pdfAnzahl){ $("planStatus").textContent = "Wandle "+pdfAnzahl+" PDF-Plan/Pläne um …"; }
    for(const p of PLANS){ if(istPdf(p.img)){ try{ p.img = await pdfNachBild(p.img); }catch(e){ console.warn("PDF-Render fehlgeschlagen:", p.name, e); p.img=""; } } }
    if(!PLANS.some(p => (p.projekt||"—")===(curProjekt||"—"))) curProjekt = PLANS[0].projekt;
    renderProjektSelect();
    if(!plansImProjekt().some(p => p.name===curPlanName)) waehleErstenPlan();
    renderPlanSelect();
    resetZoom(); renderPlan();
    cacheStorePlans();
    $("planStatus").textContent = PLANS.length + " Grundriss(e) geladen.";
  }catch(e){
    $("planStatus").innerHTML = '<span class="fehler">Grundrisse konnten nicht geladen werden: '+e.message+'</span>';
  }
}

/* ---- Mängel aus Notion ---- */
async function ladeMangel(){
  $("planStatus").textContent = "Lade Mängel aus Notion …";
  try{
    const r = await post(N8N_READ_MANGEL, { secret:SECRET });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const rows = await r.json();
    const arr = Array.isArray(rows) ? rows : [];
    MANGEL = arr.map((x,i) => ({
      id:"n"+i,
      mangel:x.mangel||"", beschreibung:x.beschreibung||"", raum:x.raum||"Sonstiges",
      status:x.status||"offen", posX:Number(x.posX)||0, posY:Number(x.posY)||0,
      grundriss:x.grundriss||"", gewerk:x.gewerk||"", haus:x.haus||"", wohnung:x.wohnung||"",
      foto:x.foto||"", planausschnitt:x.planausschnitt||"", datum:x.datum||""
    }));
    selId=null;
    renderPlan(); renderZaehler();
    cacheStoreMangel();
    $("planStatus").textContent = MANGEL.length + " Mangel/Mängel geladen.";
  }catch(e){
    $("planStatus").innerHTML = '<span class="fehler">Mängel konnten nicht geladen werden: '+e.message+'</span>';
  }
}

/* ============ CACHE (IndexedDB) ============ */
let _db = null;
function idb(){
  return new Promise((res,rej) => {
    if(_db) return res(_db);
    const r = indexedDB.open("hofmann_maengel", 1);
    r.onupgradeneeded = () => { if(!r.result.objectStoreNames.contains("kv")) r.result.createObjectStore("kv"); };
    r.onsuccess = () => { _db = r.result; res(_db); };
    r.onerror   = () => rej(r.error);
  });
}
async function cacheGet(k){
  try{ const db=await idb(); return await new Promise(res => { const t=db.transaction("kv","readonly").objectStore("kv").get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>res(null); }); }
  catch(e){ return null; }
}
async function cacheSet(k,v){
  try{ const db=await idb(); return await new Promise(res => { const t=db.transaction("kv","readwrite").objectStore("kv").put(v,k); t.onsuccess=()=>res(true); t.onerror=()=>res(false); }); }
  catch(e){ return false; }
}

/* localStorage-Cache (überlebt in App-Webviews meist besser als IndexedDB) */
function jpegVerkleinern(dataUrl, maxW, q){
  return new Promise((res,rej) => {
    const im = new Image();
    im.onload = () => {
      let w=im.naturalWidth, h=im.naturalHeight;
      if(!w || !h){ return rej(new Error("keine Maße")); }
      if(w>maxW){ const s=maxW/w; w=Math.round(w*s); h=Math.round(h*s); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(im, 0,0, w,h);
      res(cv.toDataURL("image/jpeg", q));
    };
    im.onerror = () => rej(new Error("Bildfehler"));
    im.src = dataUrl;
  });
}
async function komprimierePlanBilder(plans){
  const out=[];
  for(const p of plans){
    let img=p.img;
    if(img && img.length>180000){ try{ img = await jpegVerkleinern(img, 1500, 0.72); }catch(e){} }
    out.push({ projekt:p.projekt, name:p.name, img });
  }
  return out;
}
async function cacheStorePlans(){
  try{
    const komp = await komprimierePlanBilder(PLANS);
    try{ localStorage.setItem("hh_plans", JSON.stringify(komp)); }
    catch(e){ try{ localStorage.removeItem("hh_plans"); }catch(_){} }
    cacheSet("plans", komp);
  }catch(e){ cacheSet("plans", PLANS); }
}
function cacheStoreMangel(){
  try{ localStorage.setItem("hh_mangel", JSON.stringify(MANGEL)); }catch(e){}
  cacheSet("mangel", MANGEL);
}
async function cacheLadePlans(){
  try{ const s=localStorage.getItem("hh_plans"); if(s){ const a=JSON.parse(s); if(Array.isArray(a) && a.length) return a; } }catch(e){}
  const v = await cacheGet("plans"); return (Array.isArray(v) && v.length) ? v : null;
}
async function cacheLadeMangel(){
  try{ const s=localStorage.getItem("hh_mangel"); if(s){ const a=JSON.parse(s); if(Array.isArray(a)) return a; } }catch(e){}
  const v = await cacheGet("mangel"); return Array.isArray(v) ? v : null;
}

/* ============ AUSWAHL-HILFEN ============ */
function projekteListe(){
  const seen=[]; PLANS.forEach(p => { const k=p.projekt||""; if(!seen.includes(k)) seen.push(k); });
  return seen;
}
function plansImProjekt(){ return PLANS.filter(p => (p.projekt||"")===(curProjekt||"")); }
function curPlan(){ return plansImProjekt().find(p => p.name===curPlanName) || plansImProjekt()[0] || null; }
function waehleErstenPlan(){ const l=plansImProjekt(); curPlanName = l.length ? l[0].name : ""; }

function renderProjektSelect(){
  const liste = projekteListe();
  $("selProjekt").innerHTML = liste.map(p => `<option value="${escAttr(p)}"${p===curProjekt?" selected":""}>${esc(p||"(ohne Projekt)")}</option>`).join("");
}
function renderPlanSelect(){
  const l = plansImProjekt();
  $("selPlan").innerHTML = l.map(p => `<option value="${escAttr(p.name)}"${p.name===curPlanName?" selected":""}>${esc(p.name)}</option>`).join("");
}

/* ============ PLAN + PINS ============ */
function mangelDiesesPlans(){ return MANGEL.filter(m => m.grundriss===curPlanName); }

function renderPlan(){
  const p = curPlan();
  $("planTitel").textContent = p ? ((curProjekt?curProjekt+" · ":"")+p.name) : "Grundriss";
  const inner = $("planinner");
  if(!p || !p.img){
    inner.innerHTML = '<div class="leer"><span class="em">🏗️</span>Kein Grundriss geladen. Oben „⟳ Pläne" drücken – die Grundrisse kommen aus Notion.</div>';
    $("planHinweis").style.display = "none";
    renderListe(); renderZaehler();
    return;
  }
  $("planHinweis").style.display = "block";
  inner.innerHTML = '<img id="planimg" src="'+p.img+'" alt="Grundriss">';
  const img = $("planimg");
  img.onload = () => zeichnePins();
  if(img.complete) zeichnePins();
  applyTransform();
  renderListe(); renderZaehler();
}

function zeichnePins(){
  const inner = $("planinner");
  inner.querySelectorAll(".pin").forEach(n => n.remove());
  mangelDiesesPlans().forEach((m,i) => {
    const el = document.createElement("div");
    el.className = "pin " + stKlasse(m.status) + (m.id===selId?" aktiv":"");
    el.style.left = m.posX + "%";
    el.style.top  = m.posY + "%";
    el.dataset.id = m.id;
    el.innerHTML = '<div class="scaler" style="transform:scale('+(1/scale)+')"><div class="marker"><span>'+(i+1)+'</span></div></div>';
    inner.appendChild(el);
  });
}

function neuenPinSetzen(x, y){
  const neu = {
    id:"neu", mangel:"", beschreibung:"", raum:ctx.raum||"Sonstiges", status:"offen",
    posX:Math.round(x*100)/100, posY:Math.round(y*100)/100, grundriss:curPlanName,
    gewerk:"", haus:ctx.haus||"", wohnung:ctx.wohnung||"", foto:"", planausschnitt:"", datum:heute(), _neu:true
  };
  selId = "neu";
  MANGEL = MANGEL.filter(m => m.id!=="neu").concat(neu);
  renderPlan();
  oeffneDetail(neu);
  scrollDetail();
}

/* ============ INTERAKTION: Zoom / Pan / Tap ============ */
function clampScale(s){ return Math.max(1, Math.min(6, s)); }
function resetZoom(apply){ scale=1; tx=0; ty=0; if(apply) applyTransform(); }
function applyTransform(){
  const box=$("planbox"), inner=$("planinner");
  if(!box || !inner) return;
  const bw=box.clientWidth, bh=box.clientHeight || inner.offsetHeight || 1;
  if(scale<=1){ scale=1; tx=0; ty=0; }
  else{
    const sw=bw*scale, sh=(inner.offsetHeight||bh)*scale;
    tx=Math.max(Math.min(0,bw-sw), Math.min(0,tx));
    ty=Math.max(Math.min(0,bh-sh), Math.min(0,ty));
  }
  inner.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")";
  inner.querySelectorAll(".pin .scaler").forEach(s => s.style.transform = "scale("+(1/scale)+")");
}
function zoomAtAbsolute(cx, cy, ns){
  ns = clampScale(ns);
  if(Math.abs(ns-scale)<0.0001) return;
  tx = cx - (cx - tx) * (ns/scale);
  ty = cy - (cy - ty) * (ns/scale);
  scale = ns;
  applyTransform();
}
function zoomBy(cx, cy, factor){ zoomAtAbsolute(cx, cy, scale*factor); }

function initInteraktion(){
  const box = $("planbox");
  const pointers = new Map();
  let g = { mode:null, moved:false, downTarget:null, sx:0, sy:0, stx:0, sty:0, sdist:0, sscale:1 };
  const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);

  box.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = box.getBoundingClientRect();
    zoomBy(e.clientX-rect.left, e.clientY-rect.top, e.deltaY<0 ? 1.15 : 1/1.15);
  }, { passive:false });

  box.addEventListener("dblclick", e => {
    e.preventDefault();
    const rect = box.getBoundingClientRect();
    zoomBy(e.clientX-rect.left, e.clientY-rect.top, scale<2 ? 1.9 : 1/2.6);
  });

  box.addEventListener("pointerdown", e => {
    pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    try{ box.setPointerCapture(e.pointerId); }catch(_){}
    if(pointers.size===1){
      g.mode="pan"; g.moved=false; g.downTarget=e.target;
      g.stx=tx; g.sty=ty; g.sx=e.clientX; g.sy=e.clientY;
    } else if(pointers.size===2){
      const p=[...pointers.values()];
      g.mode="pinch"; g.moved=true; g.sdist=dist(p[0],p[1]); g.sscale=scale;
    }
  });

  box.addEventListener("pointermove", e => {
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    const pts=[...pointers.values()];
    if(g.mode==="pinch" && pts.length>=2){
      const d=dist(pts[0],pts[1]);
      if(g.sdist>0){
        const rect=box.getBoundingClientRect();
        const mx=(pts[0].x+pts[1].x)/2-rect.left, my=(pts[0].y+pts[1].y)/2-rect.top;
        zoomAtAbsolute(mx, my, g.sscale * d/g.sdist);
      }
      return;
    }
    if(g.mode==="pan"){
      const dx=e.clientX-g.sx, dy=e.clientY-g.sy;
      if(Math.hypot(dx,dy)>6) g.moved=true;
      if(scale>1){ tx=g.stx+dx; ty=g.sty+dy; applyTransform(); }
    }
  });

  const ende = e => {
    if(pointers.has(e.pointerId)) pointers.delete(e.pointerId);
    if(pointers.size===0){
      if(g.mode==="pan" && !g.moved) tapAuf(e, g.downTarget);
      g.mode=null;
    } else if(pointers.size===1){
      const only=[...pointers.values()][0];
      g.mode="pan"; g.moved=true; g.stx=tx; g.sty=ty; g.sx=only.x; g.sy=only.y;
    }
  };
  box.addEventListener("pointerup", ende);
  box.addEventListener("pointercancel", ende);
}

function tapAuf(e, target){
  const pin = target && target.closest ? target.closest(".pin") : null;
  if(pin){
    const m = MANGEL.find(x => x.id===pin.dataset.id);
    if(m){ selId=m.id; renderPlan(); oeffneDetail(m); scrollDetail(); }
    return;
  }
  const img = $("planimg"); if(!img) return;
  const rect = img.getBoundingClientRect();
  if(e.clientX<rect.left || e.clientX>rect.right || e.clientY<rect.top || e.clientY>rect.bottom) return;
  const x = ((e.clientX-rect.left)/rect.width)*100;
  const y = ((e.clientY-rect.top)/rect.height)*100;
  neuenPinSetzen(x, y);
}

/* ============ DETAIL-FORMULAR ============ */
function oeffneDetail(m){
  $("detailKarte").style.display = "block";

    <label>Titel<input id="fTitel" value="${escAttr(m.mangel)}" placeholder="z.B. Kratzer im Fensterrahmen"></label>
    <label>Beschreibung<textarea id="fBeschr" placeholder="Details …">${esc(m.beschreibung)}</textarea></label>
    <div class="reihe">
      <label>Raum<select id="fRaum">${RAEUME.map(r=>`<option${r===m.raum?" selected":""}>${r}</option>`).join("")}</select></label>
      <label>Gewerk<select id="fGewerk">${GEWERKE.map(gw=>`<option value="${gw}"${gw===m.gewerk?" selected":""}>${gw||"–"}</option>`).join("")}</select></label>
    </div>
    <div class="reihe">
      <label>Haus<select id="fHaus">${HAEUSER.map(h=>`<option value="${h}"${h===m.haus?" selected":""}>${h||"–"}</option>`).join("")}</select></label>
      <label>Wohnung<select id="fWohnung">${wohnungOptions(m.wohnung)}</select></label>
    </div>
    <label>Status<select id="fStatus">
      <option value="offen"${m.status==="offen"?" selected":""}>offen</option>
      <option value="in Bearbeitung"${/bearb/i.test(m.status)?" selected":""}>in Bearbeitung</option>
      <option value="behoben"${m.status==="behoben"?" selected":""}>behoben</option>
    </select></label>
    <label>Foto
      <span class="filebtn" id="fotoBtn">📷 Foto wählen / aufnehmen</span>
      <input type="file" id="fFoto" accept="image/*" capture="environment">
      <div id="fotoVorschau"></div>
    </label>
    <div class="miniplan" id="miniplan"></div>
    <div class="aktionen">
      <button class="btn rot" id="btnSpeichern">✓ In Notion speichern</button>
      <button class="btn" id="btnAbbrechen">Abbrechen</button>
    </div>
  `;
  if(m.foto) $("fotoVorschau").innerHTML = '<img src="'+m.foto+'" style="max-width:120px;margin-top:6px;border-radius:8px">';
  if(m.planausschnitt) $("miniplan").innerHTML = '<div style="font-size:11px;color:var(--grau);margin-bottom:3px">Planausschnitt</div><img src="'+m.planausschnitt+'">';

  let fotoData = m.foto || "";
  $("fotoBtn").onclick = () => $("fFoto").click();
  $("fFoto").onchange = async ev => {
    const f = ev.target.files[0]; if(!f) return;
    $("fotoVorschau").innerHTML = '<span style="font-size:12px;color:var(--grau)">Foto wird verarbeitet …</span>';
    try{
      fotoData = await bildKomprimieren(f);
      $("fotoVorschau").innerHTML = '<img src="'+fotoData+'" style="max-width:120px;margin-top:6px;border-radius:8px">';
    }catch(e){
      try{ fotoData = await dateiAlsDataURL(f); $("fotoVorschau").innerHTML = '<img src="'+fotoData+'" style="max-width:120px;margin-top:6px;border-radius:8px">'; }
      catch(_){ fotoData=""; $("fotoVorschau").innerHTML = '<span style="color:var(--rot);font-size:12px">Foto konnte nicht geladen werden</span>'; }
    }
  };
  $("btnAbbrechen").onclick = () => { MANGEL = MANGEL.filter(x=>x.id!=="neu"); selId=null; $("detailKarte").style.display="none"; renderPlan(); };
  $("btnSpeichern").onclick = () => speichern(m, () => fotoData);
}

function wohnungOptions(sel){
  let o = `<option value=""${sel?"":" selected"}>–</option>`;
  for(let i=1;i<=20;i++){ const v=String(i).padStart(2,"0"); o += `<option value="${v}"${v===sel?" selected":""}>${v}</option>`; }
  return o;
}

async function speichern(m, getFoto){
  const titel = $("fTitel").value.trim();
  if(!titel){ alert("Bitte einen Titel eingeben."); return; }
  const btn = $("btnSpeichern"); btn.disabled=true; btn.textContent="Speichere …";
  const daten = {
    mangel:titel,
    beschreibung:$("fBeschr").value.trim(),
    raum:$("fRaum").value,
    gewerk:$("fGewerk").value,
    haus:$("fHaus").value,
    wohnung:$("fWohnung").value,
    status:$("fStatus").value,
    posX:m.posX, posY:m.posY,
    grundriss:curPlanName,
    projekt:curProjekt,
    datum:m.datum||heute(),
    foto:getFoto()||"",
    planausschnitt:"",
    secret:SECRET
  };
  try{ daten.planausschnitt = await macheAusschnitt(m.posX, m.posY); }catch(e){ daten.planausschnitt=""; }
  try{
    const r = await post(N8N_WRITE, daten);
    if(!r.ok) throw new Error("HTTP "+r.status);
    MANGEL = MANGEL.filter(x=>x.id!=="neu"); selId=null;
    $("detailKarte").style.display="none";
    btn.disabled=false; btn.textContent="✓ In Notion speichern";
    await ladeMangel();
    $("planStatus").innerHTML = '<span style="color:#16a34a">✓ In Notion gespeichert.</span>';
  }catch(e){
    btn.disabled=false; btn.textContent="✓ In Notion speichern";
    alert("Speichern fehlgeschlagen: "+e.message);
  }
}

/* ============ FOTO-KOMPRIMIERUNG ============ */
function dateiAlsDataURL(file){
  return new Promise((res,rej) => { const rd=new FileReader(); rd.onload=()=>res(rd.result); rd.onerror=()=>rej(new Error("Lesefehler")); rd.readAsDataURL(file); });
}
function bildKomprimieren(file){
  return new Promise((res,rej) => {
    const rd = new FileReader();
    rd.onerror = () => rej(new Error("Datei-Lesefehler"));
    rd.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max=1600;
        let w=img.naturalWidth, h=img.naturalHeight;
        if(!w || !h){ return rej(new Error("keine Bildmaße")); }
        if(w>max || h>max){ const s=Math.min(max/w, max/h); w=Math.round(w*s); h=Math.round(h*s); }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img, 0,0, w,h);
        res(cv.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = () => rej(new Error("Bild-Dekodierfehler"));
      img.src = rd.result;
    };
    rd.readAsDataURL(file);
  });
}

/* ============ PLANAUSSCHNITT (Crop mit Pin) ============ */
function macheAusschnitt(px, py){
  return new Promise((resolve) => {
    const p = curPlan(); if(!p || !p.img) return resolve("");
    const img = new Image();
    img.onload = () => {
      try{
        const W=img.naturalWidth, H=img.naturalHeight;
        const cw=Math.round(W*0.4), ch=Math.round(H*0.4);
        let sx=Math.round(W*px/100 - cw/2), sy=Math.round(H*py/100 - ch/2);
        sx=Math.max(0,Math.min(sx,W-cw)); sy=Math.max(0,Math.min(sy,H-ch));
        const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
        const gg=cv.getContext("2d");
        gg.drawImage(img, sx,sy,cw,ch, 0,0,cw,ch);
        const pinX=W*px/100 - sx, pinY=H*py/100 - sy;
        gg.fillStyle="#c0182c"; gg.strokeStyle="#fff"; gg.lineWidth=Math.max(2,cw/120);
        gg.beginPath(); gg.arc(pinX,pinY,Math.max(8,cw/28),0,Math.PI*2); gg.fill(); gg.stroke();
        resolve(cv.toDataURL("image/png"));
      }catch(e){ resolve(""); }
    };
    img.onerror = () => resolve("");
    img.src = p.img;
  });
}

/* ============ PDF-ERKENNUNG + RENDERING ============ */
function istPdf(d){
  if(typeof d!=="string") return false;
  const i = d.indexOf(","); if(i<0) return false;
  return d.slice(i+1, i+6) === "JVBER";   // %PDF -> base64 beginnt mit "JVBER"
}
async function pdfNachBild(dataUrl){
  if(!window.pdfjsLib) throw new Error("PDF.js nicht geladen");
  const b64 = dataUrl.slice(dataUrl.indexOf(",")+1);
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  const pdf = await pdfjsLib.getDocument({ data:arr }).promise;
  const page = await pdf.getPage(1);
  const vp = page.getViewport({ scale:2 });
  const cv = document.createElement("canvas");
  cv.width = vp.width; cv.height = vp.height;
  await page.render({ canvasContext:cv.getContext("2d"), viewport:vp }).promise;
  return cv.toDataURL("image/png");
}

/* ============ HELFER ============ */
function stKlasse(s){ if(/bearb/i.test(s)) return "bearb"; if(s==="behoben") return "behoben"; return "offen"; }
function heute(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s==null?"":s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escAttr(s){ return String(s==null?"":s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function scrollDetail(){ setTimeout(()=>$("detailKarte").scrollIntoView({behavior:"smooth",block:"nearest"}),60); }
